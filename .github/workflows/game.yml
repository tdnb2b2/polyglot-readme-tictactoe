name: Play Tic-Tac-Toe

on:
  issues:
    types: [opened]

jobs:
  play:
    if: contains(github.event.issue.title, 'Tic-Tac-Toe:')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detecting Language
        id: detect
        run: |
          TITLE="${{ github.event.issue.title }}"
          LANG=$(echo "$TITLE" | cut -d':' -f1 | tr '[:upper:]' '[:lower:]' | xargs)
          echo "lang=$LANG" >> $GITHUB_OUTPUT
          echo "Detected language: $LANG"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        if: steps.detect.outputs.lang == 'javascript' || steps.detect.outputs.lang == 'typescript'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Go
        if: steps.detect.outputs.lang == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Rust
        if: steps.detect.outputs.lang == 'rust'
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Java
        if: steps.detect.outputs.lang == 'java' || steps.detect.outputs.lang == 'kotlin' || steps.detect.outputs.lang == 'scala'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup PHP
        if: steps.detect.outputs.lang == 'php'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Setup Ruby
        if: steps.detect.outputs.lang == 'ruby'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Setup .NET
        if: steps.detect.outputs.lang == 'c#' || steps.detect.outputs.lang == 'csharp'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Setup Swift
        if: steps.detect.outputs.lang == 'swift'
        uses: swift-actions/setup-swift@v2

      # --- Build Steps ---
      
      - name: Build Rust
        if: steps.detect.outputs.lang == 'rust'
        run: cd implementations/rust && cargo build --release

      - name: Build Java
        if: steps.detect.outputs.lang == 'java'
        run: javac implementations/java/Game.java

      - name: Build Kotlin
        if: steps.detect.outputs.lang == 'kotlin'
        run: kotlinc implementations/kotlin/Game.kt -include-runtime -d implementations/kotlin/Game.jar

      - name: Build Scala
        if: steps.detect.outputs.lang == 'scala'
        run: scalac implementations/scala/Game.scala

      - name: Build C
        if: steps.detect.outputs.lang == 'c'
        run: gcc implementations/c/game.c -o implementations/c/game

      - name: Build C++
        if: steps.detect.outputs.lang == 'c++' || steps.detect.outputs.lang == 'cpp'
        run: g++ implementations/cpp/game.cpp -o implementations/cpp/game

      - name: Build C#
        if: steps.detect.outputs.lang == 'c#' || steps.detect.outputs.lang == 'csharp'
        run: dotnet build implementations/csharp/game.csproj -c Release

      - name: Build Swift
        if: steps.detect.outputs.lang == 'swift'
        run: swiftc implementations/swift/game.swift -o implementations/swift/game

      # --- Dispatch & Update ---

      - name: Run Dispatcher
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: python3 dispatcher.py

      - name: Commit & Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md game_state.json
          git commit -m "Update board for ${{ steps.detect.outputs.lang }}" || echo "No changes to commit"
          git push

      - name: Close Issue
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          comment: "Move processed successfully! Check the README for the updated board."
