name: Python Tic-Tac-Toe
on:
  issues:
    types: [opened]

jobs:
  play:
    runs-on: ubuntu-latest
    if: "${{ contains(github.event.issue.title, 'Python: Tic-Tac-Toe:') }}"
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: |
          echo "=== Debug: Checking shared/board.py ==="
          cat shared/board.py | head -40
          echo "=== Debug: Checking python version ==="
          python3 --version
      - run: pip install requests
      - run: python3 dispatcher.py run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          LANGUAGE_OVERRIDE: python
      - run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md game_state.json
          git commit -m "Update Python game state" || echo "No changes"
          git push origin main
