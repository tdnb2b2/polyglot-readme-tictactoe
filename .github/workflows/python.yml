name: Python Tic-Tac-Toe
on:
  workflow_dispatch:
  issues:
    types: [opened]

jobs:
  play:
    runs-on: ubuntu-latest
    if: "${{ contains(github.event.issue.title, 'Python: Tic-Tac-Toe:') }}"
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug Environment
        run: |
          echo "ISSUE_TITLE: $ISSUE_TITLE"
          echo "ISSUE_NUMBER: $ISSUE_NUMBER"
          echo "REPO: $REPO"
          echo "=== Checking shared/board.py for pipe escape ==="
          grep -n "safe_link" shared/board.py || echo "safe_link not found - table may break"
          cat shared/board.py | head -100

      - name: Install dependencies
        run: pip install requests

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Play Game
        run: python3 dispatcher.py run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}

      - name: Commit and Push changes
        if: success()
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md game_state.json
          git commit -m "game: update state and readme" || echo "No changes"
          for i in 1 2 3 4 5 6; do
            git pull --rebase origin main || true
            git push origin main && break || sleep $((RANDOM % 10 + 5))
          done
