name: Python Tic-Tac-Toe
on:
  workflow_dispatch:
  workflow_dispatch:
  issues:
    types: [opened]

jobs:
  play:
    runs-on:
  workflow_dispatch:
  workflow_dispatch: ubuntu-latest
    if: "${{ contains(github.event.issue.title, 'Python:
  workflow_dispatch:
  workflow_dispatch: Tic-Tac-Toe:') }}"
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: |
          echo "=== Debug: Checking shared/board.py ==="
          cat shared/board.py | head -40
          echo "=== Debug: Checking python version ==="
          python3 --version
      - run: pip install requests
      - run: python3 dispatcher.py run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          LANGUAGE_OVERRIDE: python
      - run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md game_state.json
          git commit -m 'game: update state and readme' || echo 'No changes'
          for i in 1 2 3 4 5 6; do git pull --rebase origin main || true; git push origin main && break || sleep $((RANDOM % 10 + 5)); done
