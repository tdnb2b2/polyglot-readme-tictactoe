name: TypeScript Tic-Tac-Toe
on:
  issues:
    types: [opened]

jobs:
  play:
    runs-on: ubuntu-latest
    if: "${{ contains(github.event.issue.title, 'TypeScript: Tic-Tac-Toe:') }}"
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: pip install requests
      - run: python3 dispatcher.py run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          LANGUAGE_OVERRIDE: typescript
      - run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md game_state.json
          git commit -m "Update TypeScript game state" || echo "No changes"
          git push origin main
