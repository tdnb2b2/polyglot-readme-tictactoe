name: TypeScript Tic-Tac-Toe
on:
  issues:
    types: [opened]
  workflow_dispatch:

jobs:
  play:
    runs-on: ubuntu-latest
    if: "${{ contains(github.event.issue.title, 'TypeScript: Tic-Tac-Toe:') }}"
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests

      - name: Setup TypeScript
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install TypeScript dependencies
        run: |
          cd implementations/typescript
          npm install

      - name: Play Game
        run: python3 dispatcher.py run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          LANGUAGE_OVERRIDE: typescript

      - name: Commit and Push changes
        if: success()
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md game_state.json
          git commit -m "game: update state and readme" || echo "No changes"
          for i in 1 2 3 4 5 6; do
            git pull --rebase origin main || true
            git push origin main && break || sleep $((RANDOM % 10 + 5))
          done
