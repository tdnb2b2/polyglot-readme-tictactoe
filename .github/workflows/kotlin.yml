name: Kotlin Tic-Tac-Toe
on:
  issues:
    types: [opened, edited, reopened]

jobs:
  play:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.title, 'Kotlin')
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - run: pip install requests
      - run: |
          sudo apt-get update
          sudo apt-get install -y kotlin
          cd implementations/kotlin
          kotlinc Game.kt -include-runtime -d Game.jar
          java -jar Game.jar
        env:
          CELL: ${{ github.event.issue.title }}
          ACTION: put
      - run: python3 dispatcher.py run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          LANGUAGE_OVERRIDE: kotlin
      - run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md game_state.json
          git commit -m "Update Kotlin game state" || echo "No changes"
          git push origin main
